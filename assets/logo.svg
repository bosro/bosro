<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="65%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#e8ff3c" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#e8ff3c" stop-opacity="0"/>
    </radialGradient>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
    <rect x="0" y="0" width="512" height="512" fill="#0a0a0a" opacity="0"/>
    <!-- scanline texture -->
    <g opacity="0.05">
      <rect x="0" y="0" width="512" height="1" fill="#fff"/>
      <rect x="0" y="10" width="512" height="1" fill="#fff"/>
      <rect x="0" y="20" width="512" height="1" fill="#fff"/>
      <rect x="0" y="30" width="512" height="1" fill="#fff"/>
      <rect x="0" y="40" width="512" height="1" fill="#fff"/>
      <rect x="0" y="50" width="512" height="1" fill="#fff"/>
      <rect x="0" y="60" width="512" height="1" fill="#fff"/>
      <rect x="0" y="70" width="512" height="1" fill="#fff"/>
      <rect x="0" y="80" width="512" height="1" fill="#fff"/>
      <rect x="0" y="90" width="512" height="1" fill="#fff"/>
    </g>
    <rect x="4" y="4" width="504" height="504" rx="108" ry="108" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  </g>

  <!-- status dot -->
  <circle cx="422" cy="90" r="17" fill="#3cff8e" filter="url(#dotGlow)"/>

  <!-- BB monogram -->
  <text x="256" y="322" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="230" letter-spacing="-10" fill="#ffffff">BB</text>

  <!-- underline accent -->
  <rect x="166" y="384" width="180" height="10" rx="5" fill="#e8ff3c"/>
</svg>
